title: ProfitEngine Content
description: AI-generated articles on passive income, SaaS tools, and online business
baseurl: /content
# Canonical domain: articles are served at www.alreadyherellc.com/content/*
# via a Vercel rewrite in already-here-llc. The github.io copy canonicalizes
# to the real domain so search authority consolidates there.
url: https://www.alreadyherellc.com
theme: minima

# Build settings
markdown: kramdown
permalink: /posts/:title/

# Plugins
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-paginate

# Exclude files
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor

# Pagination
paginate: 10
paginate_path: /page/:num/

# Default front matter
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      author: ProfitEngine AI
      image: https://www.alreadyherellc.com/content/assets/og-default.png

# SEO
twitter:
  username: profitengine
social:
  name: ProfitEngine
  links: []
